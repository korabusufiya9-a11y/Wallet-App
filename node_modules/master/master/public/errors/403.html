<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} ({{statusCode}})</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2em;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 3em 2em;
            text-align: center;
        }

        .icon {
            font-size: 4em;
            margin-bottom: 0.3em;
        }

        .status-code {
            font-size: 3em;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.3em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 0.3em;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 2em;
        }

        .message {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2em;
            text-align: center;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1em;
            margin-top: 2em;
        }

        .btn {
            display: inline-block;
            padding: 1em 1.5em;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1em;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.5);
        }

        .btn-secondary {
            background: white;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
        }

        .footer {
            background: #f8f9fa;
            padding: 1.5em 2em;
            text-align: center;
            color: #6c757d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🚫</div>
            <div class="status-code">{{statusCode}}</div>
            <h1 class="title">{{title}}</h1>
            <p class="subtitle">Access denied</p>
        </div>

        <div class="content">
            <p class="message">{{message}}</p>

            <div class="actions">
                <button class="btn btn-primary" onclick="window.history.back()">← Go Back</button>
                <a href="/" class="btn btn-secondary">Home Page</a>
            </div>
        </div>

        <div class="footer">
            MasterController Framework • {{environment}} environment
        </div>
    </div>
</body>
</html>
